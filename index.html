<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Plano de Baldosas</title>
<link rel="stylesheet" href="CSS/style.css">
</head>
<body>

<div class="sidebar">

<h2>Secciones</h2>

<div class="section-input">
<h4>Sección 1</h4>
<input type="number" id="w1" placeholder="Ancho (m)" step="0.01">
<input type="number" id="h1" placeholder="Largo (m)" step="0.01">
</div>

<div class="section-input">
<h4>Sección 2</h4>
<input type="number" id="w2" placeholder="Ancho (m)" step="0.01">
<input type="number" id="h2" placeholder="Largo (m)" step="0.01">
</div>

<div class="section-input">
<h4>Sección 3</h4>
<input type="number" id="w3" placeholder="Ancho (m)" step="0.01">
<input type="number" id="h3" placeholder="Largo (m)" step="0.01">
</div>

<div class="section-input">
<h4>Sección 4</h4>
<input type="number" id="w4" placeholder="Ancho (m)" step="0.01">
<input type="number" id="h4" placeholder="Largo (m)" step="0.01">
</div>

<label>Tamaño Baldosa</label>
<select id="tileSize">
<option value="0.25">25x25</option>
<option value="0.30">30x30</option>
</select>

<button onclick="generateGrid()">Generar Plano</button>

<hr>

<label>Color</label>
<input type="color" id="colorPicker">

<button onclick="exportPDF()">Exportar PDF (1 hoja)</button>
<button onclick="exportPDFMulti()">Exportar PDF (varias hojas)</button>
<button onclick="clearGrid()">Limpiar</button>

</div>

<div class="main">
  <div id="exportArea">
    <div id="grid" class="grid"></div>

    <div class="stats-export">
      <h3>Resumen</h3>
      <p id="tileCount">Baldosas: 0</p>
      <div id="colorStats"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="JS/main.js"></script>

</body>
</html>
